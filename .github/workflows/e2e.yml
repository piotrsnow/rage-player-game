name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rpgon
          POSTGRES_PASSWORD: rpgon
          POSTGRES_DB: rpgon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rpgon -d rpgon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Apply Prisma migrations
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://rpgon:rpgon@localhost:5432/rpgon

      - name: Build frontend into backend/public/dist
        run: npx vite build --outDir backend/public/dist --emptyOutDir

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          DATABASE_URL: postgresql://rpgon:rpgon@localhost:5432/rpgon
          JWT_SECRET: ci-jwt-secret-e2e-playwright-2026
          API_KEY_ENCRYPTION_SECRET: ci-encryption-key-e2e-playwright-2026!!
          CORS_ORIGIN: http://localhost:3001
          MEDIA_BACKEND: local
          PORT: 3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
