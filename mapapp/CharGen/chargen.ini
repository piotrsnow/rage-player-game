{
    "window_size": [ 800, 600 ],
    "fullscreen": false,
    "vertical_sync": false,
    "fps_limit": 60,

    "theme": "gui/themes/pennomi/pennomi.theme",

    "animated_idle": true,
    "export_optimized_sheets" : false,
    "sprite_scale": 0.12,
    "label_size": [ 85, 24 ],
    "spinner_size": [ 140, 24 ],
    "picker_size": [ 20, 20 ],
    "button_size": [ 100, 32 ],

    "music_on": false,
    "music_volume": 60,
    "music_theme": "music/sleepy_little_mouse_alternate_no_drums.ogg",
    
    "overwrite_prompt": false,

    "preload_resources" :
    [
        "gui/sounds/click1.ogg",
        "gui/sounds/click2.ogg"
    ],

    "tags_included" : [
        "all"
    ],
    "tags_excluded" : [
        "none"
    ]
}
