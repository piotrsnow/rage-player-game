# Production override — single-VM Prod-A compatible.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# MongoDB is always external (Atlas) — same as dev now. No local mongo
# container exists in either overlay.
# Media storage should use GCS (MEDIA_BACKEND=gcp).

services:
  # Valkey stays active in prod (Prod-A: backend + valkey on same VM via
  # docker-compose). Port 6379 is bound to 127.0.0.1 only so it is not
  # reachable from the public internet — backend reaches it through the
  # docker network as `valkey:6379`.
  valkey:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL to your MongoDB Atlas connection string}"
      REDIS_URL: "redis://valkey:6379"
      MEDIA_BACKEND: "gcp"
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:?Set GCS_BUCKET_NAME}"
      GCP_SERVICE_ACCOUNT_KEY: "${GCP_SERVICE_ACCOUNT_KEY:-}"
      CORS_ORIGIN: "${CORS_ORIGIN:?Set CORS_ORIGIN to your frontend domain}"
    volumes: []
