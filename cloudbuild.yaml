steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rpgon:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rpgon:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rpgon:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rpgon:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'rage-player-game'
      - '--image=gcr.io/$PROJECT_ID/rpgon:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--service-account=rage-player-game-runtime@$PROJECT_ID.iam.gserviceaccount.com'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=80'
      - '--cpu=2'
      - '--memory=2Gi'
      - '--timeout=3600'
      - '--session-affinity'
      - '--cpu-boost'
      - '--execution-environment=gen2'
      - '--set-env-vars=NODE_ENV=production,MEDIA_BACKEND=gcp,GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},CLOUD_TASKS_ENABLED=true,SELF_URL=${_SELF_URL},RUNTIME_SERVICE_ACCOUNT=rage-player-game-runtime@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets=JWT_SECRET=rpgon-jwt-secret:latest,API_KEY_ENCRYPTION_SECRET=rpgon-encryption-secret:latest,DATABASE_URL=rpgon-database-url:latest,GCS_BUCKET_NAME=rpgon-gcs-bucket:latest,OPENAI_API_KEY=rpgon-openai-api-key:latest,ANTHROPIC_API_KEY=rpgon-anthropic-api-key:latest,ELEVENLABS_API_KEY=rpgon-elevenlabs-api-key:latest,STABILITY_API_KEY=rpgon-stability-api-key:latest,GEMINI_API_KEY=rpgon-gemini-api-key:latest,MESHY_API_KEY=rpgon-meshy-api-key:latest'

substitutions:
  _REGION: 'europe-central2'
  # Set after first deploy: gcloud run services describe rage-player-game --region europe-central2 --format 'value(status.url)'
  _SELF_URL: ''

images:
  - 'gcr.io/$PROJECT_ID/rpgon:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/rpgon:latest'
