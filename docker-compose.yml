services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: rpgon

  valkey:
    image: valkey/valkey:7-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1000", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3001:8080"
    depends_on:
      - mongodb
      - valkey
    environment:
      # Dockerfile sets NODE_ENV=production since the image is built for
      # prod. For local compose dev we override to development to relax
      # CORS warnings and any other prod-strict behavior. The prod overlay
      # (docker-compose.prod.yml) flips it back to production.
      NODE_ENV: "${NODE_ENV:-development}"
      PORT: "8080"
      HOST: "0.0.0.0"
      DATABASE_URL: "mongodb://mongodb:27017/rpgon"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      API_KEY_ENCRYPTION_SECRET: "${API_KEY_ENCRYPTION_SECRET:?Set API_KEY_ENCRYPTION_SECRET in .env}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3001}"
      MEDIA_BACKEND: "${MEDIA_BACKEND:-local}"
      MEDIA_LOCAL_PATH: "/data/media"
      # GCP (optional, only when MEDIA_BACKEND=gcp)
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:-}"
      GCP_SERVICE_ACCOUNT_KEY: "${GCP_SERVICE_ACCOUNT_KEY:-}"
      # Default API keys (optional, users can add their own via UI)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      STABILITY_API_KEY: "${STABILITY_API_KEY:-}"
    volumes:
      - media-data:/data/media
    # Docker Compose Watch: `npm run dev:watch` syncs local source into the
    # running container and restarts the backend process on change. Frontend
    # assets are baked into the image at build time; a change under `src/`
    # or `shared/` (consumed by the FE build) triggers a full rebuild so the
    # new bundle lands in `public/dist`. For fast FE iteration use
    # `npm run dev:frontend` (vite HMR on :5173) alongside the watched backend.
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/backend/src
        - action: sync+restart
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/prisma
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./package.json

  # BullMQ worker: dedicated process that consumes ai:* queues. Shares the
  # backend image and runs `npm run worker` (src/workers/aiWorker.js). On
  # single-VM Prod-A the main backend also starts workers in-process, so
  # this container is optional — it becomes meaningful when you scale out
  # or want worker isolation. Disabled by default via the `workers` profile;
  # `docker compose --profile workers up` to activate.
  backend-worker:
    build: .
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    profiles: ["workers"]
    depends_on:
      - mongodb
      - valkey
    environment:
      WORKER_MODE: "1"
      DATABASE_URL: "mongodb://mongodb:27017/rpgon"
      REDIS_URL: "redis://valkey:6379"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      API_KEY_ENCRYPTION_SECRET: "${API_KEY_ENCRYPTION_SECRET:?Set API_KEY_ENCRYPTION_SECRET in .env}"
      MEDIA_BACKEND: "${MEDIA_BACKEND:-local}"
      MEDIA_LOCAL_PATH: "/data/media"
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:-}"
      GCP_SERVICE_ACCOUNT_KEY: "${GCP_SERVICE_ACCOUNT_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      STABILITY_API_KEY: "${STABILITY_API_KEY:-}"
    volumes:
      - media-data:/data/media

volumes:
  mongo-data:
  valkey-data:
  media-data:
