services:
  # Postgres 16 + pgvector. Local container for dev; in prod use Cloud SQL
  # for Postgres or any managed Postgres with the `vector` extension. The
  # `pgvector/pgvector:pg16` image bundles pgvector pre-installed; the
  # CREATE EXTENSION statement runs in the init migration.
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpgon
      POSTGRES_PASSWORD: rpgon
      POSTGRES_DB: rpgon
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpgon -d rpgon"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:8080"
    environment:
      # Dockerfile sets NODE_ENV=production since the image is built for
      # prod. For local compose dev we override to development to relax
      # CORS warnings and any other prod-strict behavior.
      NODE_ENV: "${NODE_ENV:-development}"
      PORT: "8080"
      HOST: "0.0.0.0"
      # Container always reaches the bundled `db` service via docker network.
      # `localhost` would mean the container itself. Host-side `prisma migrate`
      # reads its own DATABASE_URL from backend/.env (localhost:5432) — the two
      # are intentionally not synced.
      DATABASE_URL: "postgresql://rpgon:rpgon@db:5432/rpgon"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      API_KEY_ENCRYPTION_SECRET: "${API_KEY_ENCRYPTION_SECRET:?Set API_KEY_ENCRYPTION_SECRET in .env}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3001}"
      MEDIA_BACKEND: "${MEDIA_BACKEND:-local}"
      MEDIA_LOCAL_PATH: "/data/media"
      # Cloud Tasks: disabled in local dev — post-scene work runs inline
      CLOUD_TASKS_ENABLED: "false"
      # GCP (optional, only when MEDIA_BACKEND=gcp)
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:-}"
      GCP_SERVICE_ACCOUNT_KEY: "${GCP_SERVICE_ACCOUNT_KEY:-}"
      # Default API keys (optional, users can add their own via UI)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      STABILITY_API_KEY: "${STABILITY_API_KEY:-}"
    volumes:
      - media-data:/data/media
    # Docker Compose Watch: `npm run dev:watch` syncs local source into the
    # running container and restarts the backend process on change. Frontend
    # assets are baked into the image at build time; a change under `src/`
    # or `shared/` (consumed by the FE build) triggers a full rebuild so the
    # new bundle lands in `public/dist`. For fast FE iteration use
    # `npm run dev:frontend` (vite HMR on :5173) alongside the watched backend.
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/backend/src
        - action: sync+restart
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/prisma
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./package.json

volumes:
  media-data:
  pg-data:
