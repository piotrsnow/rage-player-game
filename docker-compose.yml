services:
  # Postgres 16 + pgvector. Local container for dev; gated on the `local-db`
  # compose profile so users on managed Postgres (Neon, Cloud SQL) skip it.
  # The `pgvector/pgvector:pg16` image bundles pgvector pre-installed; the
  # CREATE EXTENSION statement runs in the init migration. Toggle via
  # `COMPOSE_PROFILES=local-db` in `.env` (see `.env.example`).
  db:
    image: pgvector/pgvector:pg16
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpgon
      POSTGRES_PASSWORD: rpgon
      POSTGRES_DB: rpgon
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpgon -d rpgon"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        required: false
    ports:
      - "3001:8080"
    environment:
      # Dockerfile sets NODE_ENV=production since the image is built for
      # prod. For local compose dev we override to development to relax
      # CORS warnings and any other prod-strict behavior.
      NODE_ENV: "${NODE_ENV:-development}"
      PORT: "8080"
      HOST: "0.0.0.0"
      # Local mode (default): leave DATABASE_URL unset in root `.env`; container
      # reaches the bundled `db` service via the docker network at `db:5432`.
      # `localhost` from inside the container points at the container itself,
      # which is why host-side `prisma migrate` (run from `backend/` on the
      # host) uses its own URL via `backend/.env` (localhost:5432).
      # Neon mode: set `DATABASE_URL=postgresql://...neon.tech/...?sslmode=require`
      # in root `.env`; this override lands on the container, and you should
      # mirror the same URL in `backend/.env` so host-side prisma migrate
      # targets Neon too.
      DATABASE_URL: "${DATABASE_URL:-postgresql://rpgon:rpgon@db:5432/rpgon}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      API_KEY_ENCRYPTION_SECRET: "${API_KEY_ENCRYPTION_SECRET:?Set API_KEY_ENCRYPTION_SECRET in .env}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3001}"
      MEDIA_BACKEND: "${MEDIA_BACKEND:-local}"
      MEDIA_LOCAL_PATH: "/data/media"
      # Cloud Tasks: disabled in local dev — post-scene work runs inline
      CLOUD_TASKS_ENABLED: "false"
      # GCP (optional, only when MEDIA_BACKEND=gcp)
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:-}"
      GCP_SERVICE_ACCOUNT_KEY: "${GCP_SERVICE_ACCOUNT_KEY:-}"
      # Default API keys (optional, users can add their own via UI)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      STABILITY_API_KEY: "${STABILITY_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      MESHY_API_KEY: "${MESHY_API_KEY:-}"
      # Stable Diffusion WebUI (Automatic1111) — local REST. From inside the
      # container, `localhost` is the container itself; to reach A1111 running
      # on the Windows/macOS host use `http://host.docker.internal:7860`.
      SD_WEBUI_URL: "${SD_WEBUI_URL:-}"
      SD_WEBUI_SAMPLER: "${SD_WEBUI_SAMPLER:-}"
      SD_WEBUI_STEPS: "${SD_WEBUI_STEPS:-}"
      SD_WEBUI_CFG: "${SD_WEBUI_CFG:-}"
    volumes:
      - media-data:/data/media
    # Docker Compose Watch: `npm run dev:watch` syncs local source into the
    # running container and restarts the backend process on change. Frontend
    # assets are baked into the image at build time; a change under `src/`
    # or `shared/` (consumed by the FE build) triggers a full rebuild so the
    # new bundle lands in `public/dist`. For fast FE iteration use
    # `npm run dev:frontend` (vite HMR on :5173) alongside the watched backend.
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/backend/src
        - action: sync+restart
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/prisma
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./package.json

volumes:
  media-data:
  pg-data:
