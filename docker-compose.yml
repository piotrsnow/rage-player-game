services:
  # MongoDB lives on Atlas (managed replica set). Set DATABASE_URL in
  # `.env` to your Atlas SRV string — the backend service reads it
  # directly. No local mongo service in this file; Prisma transactions
  # need a real replica set and running a single-node RS in docker just
  # to mimic Atlas wasn't worth the operational weight for a solo dev
  # who already has an Atlas cluster.

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3001:8080"
    environment:
      # Dockerfile sets NODE_ENV=production since the image is built for
      # prod. For local compose dev we override to development to relax
      # CORS warnings and any other prod-strict behavior.
      NODE_ENV: "${NODE_ENV:-development}"
      PORT: "8080"
      HOST: "0.0.0.0"
      # Atlas SRV connection string — mandatory. No local mongo fallback.
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL in .env to your Atlas SRV connection string}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      API_KEY_ENCRYPTION_SECRET: "${API_KEY_ENCRYPTION_SECRET:?Set API_KEY_ENCRYPTION_SECRET in .env}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3001}"
      MEDIA_BACKEND: "${MEDIA_BACKEND:-local}"
      MEDIA_LOCAL_PATH: "/data/media"
      # Cloud Tasks: disabled in local dev — post-scene work runs inline
      CLOUD_TASKS_ENABLED: "false"
      # GCP (optional, only when MEDIA_BACKEND=gcp)
      GCS_BUCKET_NAME: "${GCS_BUCKET_NAME:-}"
      GCP_SERVICE_ACCOUNT_KEY: "${GCP_SERVICE_ACCOUNT_KEY:-}"
      # Default API keys (optional, users can add their own via UI)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      STABILITY_API_KEY: "${STABILITY_API_KEY:-}"
    volumes:
      - media-data:/data/media
    # Docker Compose Watch: `npm run dev:watch` syncs local source into the
    # running container and restarts the backend process on change. Frontend
    # assets are baked into the image at build time; a change under `src/`
    # or `shared/` (consumed by the FE build) triggers a full rebuild so the
    # new bundle lands in `public/dist`. For fast FE iteration use
    # `npm run dev:frontend` (vite HMR on :5173) alongside the watched backend.
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/backend/src
        - action: sync+restart
          path: ./shared
          target: /app/shared
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/prisma
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./package.json

volumes:
  media-data:
