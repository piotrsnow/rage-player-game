<!DOCTYPE html>
<html class="dark" lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/nikczemny_logo.png" />
    <title>Nikczemny Krzemuch</title>
    <link rel="preload" href="/fonts/MedievalSharp/MedievalSharp-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/New_Rocker/NewRocker-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/Sankofa_Display/SankofaDisplay-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/Bitcount/static/Bitcount-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-surface-dim text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
    <div id="root">
      <div id="splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0e0e10;gap:1.5rem;">
        <img class="splash-logo" src="/nikczemnu_logo.png" alt="Nikczemny Krzemuch" />
        <div style="display:flex;align-items:center;gap:1rem;">
          <div class="splash-spinner"></div>
          <p style="color:rgba(200,200,210,0.7);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;animation:splash-shimmer 2s ease-in-out infinite;">Łączenie z serwerem...</p>
        </div>
        <div id="boot-log"></div>
      </div>
      <style>
        .splash-logo {
          height:15rem;
          width:auto;
          filter:drop-shadow(0 4px 28px rgba(197,154,255,0.28));
          animation:splash-logo-blink 2.4s ease-in-out infinite;
        }
        @keyframes splash-logo-blink {
          0%,100% { opacity:1; }
          50% { opacity:0.82; }
        }
        @keyframes splash-shimmer {
          0% { opacity:0.5; }
          50% { opacity:1; }
          100% { opacity:0.5; }
        }
        @keyframes splash-fadeIn {
          from { opacity:0; transform:translateY(8px); }
          to { opacity:1; transform:translateY(0); }
        }
        @keyframes splash-blink {
          0%,100% { opacity:1; }
          50% { opacity:0; }
        }
        @keyframes splash-spin {
          to { transform:rotate(360deg); }
        }
        .splash-spinner {
          width:20px;height:20px;
          border:2px solid rgba(197,154,255,0.2);
          border-top-color:rgba(197,154,255,0.7);
          border-radius:50%;
          animation:splash-spin 0.8s linear infinite;
        }
        #boot-log {
          width:52rem;height:26rem;
          overflow-y:auto;border-radius:0.5rem;
          border:1px solid rgba(197,154,255,0.1);
          background:rgba(14,14,16,0.7);
          padding:1.5rem 2rem;
          font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
          font-size:16px;line-height:1.6;
          user-select:none;
          scrollbar-width:thin;
          scrollbar-color:rgba(197,154,255,0.35) rgba(14,14,16,0.4);
        }
        #boot-log .bl {
          display:flex;justify-content:space-between;gap:1em;
          animation:splash-fadeIn 0.4s ease-out both;
        }
        #boot-log .bl-status {
          flex-shrink:0;white-space:nowrap;
        }
        #boot-log .bl-cursor {
          display:inline-block;width:0.75rem;height:1.75rem;
          background:rgba(180,180,190,0.6);
          animation:splash-blink 600ms step-end infinite;
          vertical-align:middle;margin-left:0.25rem;
        }
      </style>
      <script>
        (function() {
          var LINES = [
            '[docker]   Pulling dungeon-master:latest...                    done',
            '[prisma]   Migrating dragon_loot_table...                      OK',
            '[npc-ai]   Spawning 47 villagers with questionable morals...',
            '[d50]      Calibrating probability matrices...                 OK',
            '[fastify]  Binding port 3001 to the Aether...                  OK',
            '[pgvector] Indexing 1,536-dimensional spell embeddings...      OK',
            '[auth]     Verifying adventurer credentials...                  OK',
            '[tavern]   Warming up the mead server...                       OK',
            '[loot]     Shuffling treasure tables (seed: 0xDEAD)...         OK',
            '[combat]   Loading d50 physics engine v2.7...                  OK',
            '[world]    Rendering Yeralden overworld (42 regions)...        OK',
            '[quests]   Assigning morally ambiguous objectives...           OK',
            '[music]    Tuning bardic instruments...                        OK',
            '[fog]      Initializing fog-of-war subsystem...                OK',
            '[memory]   Compressing 15 campaign facts into HNSW index...    OK',
            '[npc-ai]   Teaching merchants to overcharge adventurers...',
            '[docker]   Container rpgon-backend healthy                     \u2713',
            '[alchemy]  Brewing 12 volatile potions...                      OK',
            '[map]      Tessellating hex grid (1024x1024)...                OK',
            '[shader]   Compiling volumetric fog pass...                    OK',
            '[dungeon]  Seeding procedural catacombs (depth: 7)...          OK',
            '[ai-ctx]   Warming nano intent classifier...                   OK',
            '[tts]      Connecting to bardic speech synthesis...             OK',
            '[physics]  Bootstrapping ragdoll constraints...                OK',
            '[save]     Verifying campaign checksum integrity...             OK',
            '[guild]    Registering 8 faction reputation graphs...           OK',
            '[weather]  Simulating 30-day forecast for Yeralden...           OK',
            '[trade]    Populating merchant inventories (438 items)...       OK',
            '[bestiary] Indexing 127 creature stat blocks...                 OK',
            '[road]     Computing Dijkstra shortest paths...                 OK',
            '[crafting] Loading 64 recipe schematics...                     OK',
            '[socket]   Opening WebSocket tunnel to multiverse...            OK',
            '[terrain]  Generating heightmap normals...                      OK',
            '[journal]  Rebuilding adventure log index...                    OK',
            '[spell]    Validating 9 arcane skill trees...                   OK',
            '[npc-ai]   Assigning personality quirks to 47 NPCs...',
            '[lore]     Injecting 12 world lore sections...                  OK',
            '[docker]   Warming up sidecar containers...                     OK',
            '[quest]    Linking prerequisite chains (depth: 3)...            OK',
            '[embed]    Building HNSW index (ef=200, M=16)...               OK',
            '[crown]    Minting 10,000 Zlote Korony into treasury...         OK',
            '[karma]    Calibrating moral consequence engine...              OK',
            '[portal]   Stabilizing interdimensional gateway...              OK',
            '[rumor]    Distributing hearsay across 6 taverns...             OK',
            '[scroll]   Transcribing ancient spell scrolls...                OK',
            '[arena]    Scheduling gladiator tournament brackets...           OK',
            '[rng]      Seeding entropy pool (source: cosmic noise)...       OK',
            '[tavern]   Hiring suspicious bartender (loyalty: 12%)...',
            '[vault]    Encrypting player secrets (AES-256-GCM)...           OK',
            '[mount]    Saddling 3 griffons for fast travel...               OK',
            '[docker]   All services nominal                                \u2713',
          ];
          for (var i = LINES.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = LINES[i]; LINES[i] = LINES[j]; LINES[j] = t;
          }
          var box = document.getElementById('boot-log');
          var idx = 0;
          var cursor = document.createElement('span');
          cursor.className = 'bl-cursor';
          box.appendChild(cursor);

          var STATUS_RE = /^(.+?)\s{2,}(OK|done|\u2713)$/;
          function addLine() {
            if (idx >= LINES.length) { cursor.remove(); return; }
            var div = document.createElement('div');
            div.className = 'bl';
            var raw = LINES[idx];
            var m = raw.match(STATUS_RE);
            if (m) {
              var txt = document.createElement('span');
              txt.textContent = m[1];
              var st = document.createElement('span');
              st.className = 'bl-status';
              st.textContent = m[2];
              if (m[2] === '\u2713') st.style.color = '#7ee787';
              div.style.color = 'rgba(180,180,190,0.75)';
              div.appendChild(txt);
              div.appendChild(st);
            } else {
              div.style.color = 'rgba(180,180,190,0.75)';
              div.textContent = raw;
            }
            box.insertBefore(div, cursor);
            box.scrollTop = box.scrollHeight;
            idx++;
            setTimeout(addLine, 400 + Math.random() * 400);
          }
          setTimeout(addLine, 300 + Math.random() * 300);
        })();
      </script>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
